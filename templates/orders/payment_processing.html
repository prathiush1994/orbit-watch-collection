{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-content padding-y">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-6 col-lg-5 text-center">

    <div style="margin-top:80px; margin-bottom:30px;">

        <!-- Spinning loader -->
        <div style="width:100px;height:100px;
                    background:linear-gradient(135deg,#3167eb,#5b8dee);
                    border-radius:50%;display:inline-flex;align-items:center;
                    justify-content:center;margin-bottom:24px;
                    box-shadow:0 8px 25px rgba(49,103,235,0.35);
                    animation: pulse 1.5s ease-in-out infinite;">
            <i class="fas fa-spinner fa-spin" style="font-size:40px;color:#fff;"></i>
        </div>

        <h4 class="font-weight-bold mb-2">Processing Your Payment…</h4>
        <p class="text-muted mb-0">
            Please wait. Your order is being confirmed.
        </p>
        <p class="text-muted small mt-1">
            Do <strong>not</strong> close or refresh this page.
        </p>
    </div>

    <!-- Progress bar -->
    <div class="progress mb-4" style="height:6px;border-radius:10px;">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
             role="progressbar" style="width:100%"></div>
    </div>

    <p class="text-muted small">
        <i class="fas fa-shield-alt mr-1 text-success"></i>
        Your payment was captured. We are confirming your order.
    </p>

</div>
</div>
</div>
</section>

<style>
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.08); }
}
</style>

<script>
// Poll every 2 seconds to check if webhook has created the order
const paymentId = "{{ payment_id }}";

function checkStatus() {
    fetch("/orders/check-order-status/?payment_id=" + paymentId)
        .then(res => res.json())
        .then(data => {
            if (data.status === "ready") {
                // Order created by webhook — go to success page
                window.location.href = "/orders/payment-success/" + data.order_number + "/";
            } else {
                // Not ready yet — check again in 2 seconds
                setTimeout(checkStatus, 2000);
            }
        })
        .catch(() => {
            // Network error — try again
            setTimeout(checkStatus, 3000);
        });
}

// Start polling after 1 second
setTimeout(checkStatus, 1000);
</script>

{% endblock %}
