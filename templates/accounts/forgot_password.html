{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="section-content padding-y" style="min-height:84vh;">
<div class="card mx-auto" style="max-width:420px; margin-top:80px;">
    <div class="card-body">

        <h4 class="card-title mb-1 text-center">Forgot Password?</h4>
        <p class="text-muted text-center mb-4" style="font-size:14px;">
            Enter your email and we'll send you a reset code.
        </p>

        {% include 'includes/alert.html' %}

        <form method="POST" action="{% url 'forgot_password' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control"
                       placeholder="Enter your email" required autofocus>
            </div>
            <div class="form-group mt-3">
                <button type="submit" class="btn btn-block btn-lg"
                        style="background:#FF6B00; color:#fff; font-weight:600;">
                    Send Reset Code
                </button>
            </div>
        </form>

    </div>
</div>

<p class="text-center mt-3">
    <a href="{% url 'login' %}">← Back to Login</a>
</p>
<br>
</section>

{% endblock %}
