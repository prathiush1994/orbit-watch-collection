{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-content padding-y bg">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-7">

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0 font-weight-bold">
                <i class="fa fa-edit mr-2"></i>Edit Address
            </h5>
        </div>
        <div class="card-body">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'edit_address' address.id %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div class="form-row">
                    <div class="col form-group">
                        <label>Full Name <span class="text-danger">*</span></label>
                        <input type="text" name="full_name" class="form-control"
                               value="{{ address.full_name }}" required>
                    </div>
                    <div class="col form-group">
                        <label>Phone <span class="text-danger">*</span></label>
                        <input type="text" name="phone" class="form-control"
                               value="{{ address.phone }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Address <span class="text-danger">*</span></label>
                    <textarea name="address_line" class="form-control" rows="3"
                              required>{{ address.address_line }}</textarea>
                </div>

                <div class="form-row">
                    <div class="col form-group">
                        <label>District / Town <span class="text-danger">*</span></label>
                        <input type="text" name="city" class="form-control"
                               value="{{ address.city }}" required>
                    </div>
                    <div class="col form-group">
                        <label>State <span class="text-danger">*</span></label>
                        <input type="text" name="state" class="form-control"
                               value="{{ address.state }}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="col form-group">
                        <label>Pin Code <span class="text-danger">*</span></label>
                        <input type="text" name="pincode" class="form-control"
                               value="{{ address.pincode }}" required>
                    </div>
                    <div class="col form-group">
                        <label>Address Type</label>
                        <select name="address_type" class="form-control">
                            <option value="Home"  {% if address.address_type == 'Home'  %}selected{% endif %}>Home</option>
                            <option value="Work"  {% if address.address_type == 'Work'  %}selected{% endif %}>Work</option>
                            <option value="Other" {% if address.address_type == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox"
                           name="is_default" id="setDefault"
                           {% if address.is_default %}checked{% endif %}>
                    <label class="form-check-label" for="setDefault">
                        Set as default address
                    </label>
                </div>

                <div class="d-flex" style="gap:10px;">
                    {% if next == 'checkout' %}
                        <a href="{% url 'checkout' %}" class="btn btn-light px-4">Cancel</a>
                    {% else %}
                        <a href="{% url 'manage_address' %}" class="btn btn-light px-4">Cancel</a>
                    {% endif %}
                    <button type="submit" class="btn btn-primary px-5">
                        Update Address
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>
</div>
</div>
</section>
{% endblock %}
