{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="section-content padding-y" style="min-height:84vh;">
<div class="card mx-auto" style="max-width:420px; margin-top:80px;">
    <div class="card-body">

        <h4 class="card-title mb-4 text-center">Sign In</h4>

        {% include 'includes/alert.html' %}

        <!-- Google Login — always visible, no database check needed -->
        <a href="/accounts/google/login/?process=login" class="btn btn-block mb-3"
           style="background:#fff; border:1px solid #ddd; font-weight:500; display:flex; align-items:center; justify-content:center; gap:8px;">
            <img src="https://developers.google.com/identity/images/g-logo.png"
                 width="18" style="vertical-align:middle;">
            Continue with Google
        </a>

        <div class="text-center text-muted mb-3">
            <small>─────── or login with email ───────</small>
        </div>

        <!-- Email / Password Login -->
        <form action="{% url 'login' %}" method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control"
                       placeholder="Enter your email" required autofocus>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Enter your password" required>
            </div>

            <div class="form-group text-right">
                <a href="{% url 'forgot_password' %}" style="color:#FF6B00; font-size:13px;">
                    Forgot password?
                </a>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-block btn-lg"
                        style="background:#FF6B00; color:#fff; font-weight:600;">
                    Sign In
                </button>
            </div>
        </form>

    </div>
</div>

<p class="text-center mt-3">
    Don't have an account? <a href="{% url 'register' %}"><strong>Sign Up</strong></a>
</p>
<br>
</section>

{% endblock %}
