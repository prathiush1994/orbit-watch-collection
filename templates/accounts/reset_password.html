{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="section-content padding-y" style="min-height:84vh;">
<div class="card mx-auto" style="max-width:420px; margin-top:80px;">
    <div class="card-body">

        <h4 class="card-title mb-1 text-center">Set New Password</h4>
        <p class="text-muted text-center mb-4" style="font-size:14px;">
            Choose a strong password for your account.
        </p>

        {% include 'includes/alert.html' %}

        <form method="POST" action="{% url 'reset_password' user.id %}">
            {% csrf_token %}

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" id="pwd" class="form-control"
                       placeholder="At least 8 characters" required>
                <!-- Strength bar -->
                <div style="height:4px; background:#eee; border-radius:4px; margin-top:6px;">
                    <div id="strength-bar"
                         style="height:100%; width:0; border-radius:4px; transition:width 0.3s, background 0.3s;">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" id="cpwd" class="form-control"
                       placeholder="Repeat password" required>
                <small id="match-msg" style="font-size:12px;"></small>
            </div>

            <div class="form-group mt-3">
                <button type="submit" class="btn btn-block btn-lg"
                        style="background:#FF6B00; color:#fff; font-weight:600;">
                    Reset Password
                </button>
            </div>
        </form>

    </div>
</div>
<br>
</section>

<script>
// Password strength bar
document.getElementById('pwd').addEventListener('input', function () {
    const val = this.value;
    let score = 0;
    if (val.length >= 8)            score++;
    if (/[A-Z]/.test(val))          score++;
    if (/[0-9]/.test(val))          score++;
    if (/[^A-Za-z0-9]/.test(val))   score++;

    const bar    = document.getElementById('strength-bar');
    const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
    bar.style.width      = (score * 25) + '%';
    bar.style.background = colors[score - 1] || '#eee';
});

// Password match indicator
document.getElementById('cpwd').addEventListener('input', function () {
    const msg = document.getElementById('match-msg');
    if (this.value === document.getElementById('pwd').value) {
        msg.textContent = '✓ Passwords match';
        msg.style.color = '#22c55e';
    } else {
        msg.textContent = '✗ Passwords do not match';
        msg.style.color = '#ef4444';
    }
});
</script>

{% endblock %}
