{% load static %}
<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="expires" content="0" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<title>Orbit Watch Collection</title>

<link rel="icon" type="image/x-icon" href="{% static 'images/orbiticon.ico' %}?v=99">

<!-- Bootstrap CSS -->
<link href="{% static 'css/bootstrap.css' %}" rel="stylesheet" type="text/css"/>

<!-- Font Awesome 5 -->
<link href="{% static 'fonts/fontawesome/css/all.min.css' %}" type="text/css" rel="stylesheet">

<!-- Custom styles -->
<link href="{% static 'css/ui.css' %}" rel="stylesheet" type="text/css"/>
<link href="{% static 'css/responsive.css' %}" rel="stylesheet" media="only screen and (max-width: 1200px)"/>

</head>
<body>

{% include 'includes/navbar.html' %}

{% block content %}
{% endblock %}

{% include 'includes/footer.html' %}

<!--
    Scripts are loaded HERE at the bottom of body — NOT in <head>.

    Reason: Scripts in <head> run before the page HTML is built.
    So document.getElementById('mainImage') returns null because
    the element doesn't exist yet when the script runs.

    Loading scripts at the bottom means the full page HTML is
    already in the DOM when the scripts execute.
-->

<!-- jQuery -->
<script src="{% static 'js/jquery-2.0.0.min.js' %}" type="text/javascript"></script>

<!-- Bootstrap JS -->
<script src="{% static 'js/bootstrap.bundle.min.js' %}" type="text/javascript"></script>

<!-- Global site scripts -->
<script src="{% static 'js/script.js' %}" type="text/javascript"></script>

{% block extra_js %}
{% endblock %}
<script src="{% static 'js/product-detail.js' %}"></script>
</body>

</html>
