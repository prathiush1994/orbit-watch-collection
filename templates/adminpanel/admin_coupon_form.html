{% extends 'adminpanel/base_admin.html' %}
{% block title %}{{ action }} Coupon{% endblock %}
{% block page_title %}{{ action }} Coupon{% endblock %}
{% block nav_coupons %}active{% endblock %}

{% block content %}

<div class="d-flex align-items-center mb-3" style="gap:10px;">
    <a href="{% url 'admin_coupon_list' %}" class="btn-action" style="background:#f0f0f0;color:#545454;">
        <i class="fas fa-arrow-left"></i> Back
    </a>
    <h5 class="mb-0 font-weight-bold">{{ action }} Coupon</h5>
</div>

<div class="a-card" style="max-width:680px;">
    <div class="a-card-body">
        <form method="POST">
            {% csrf_token %}
            <!-- Code -->
            <div class="a-form-group">
                <label class="a-label">
                    Coupon Code 
                </label>
                <input type="text" name="code" class="a-input"
                       value="{{ coupon.code|default:'' }}"
                       placeholder="e.g. ORBIT20"
                       style="text-transform:uppercase;" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="a-form-group">
                        <label class="a-label">Discount Type</label>
                        <select name="discount_type"
                                class="a-input"
                                id="discountType"
                                onchange="toggleMinOrder()">
                            <option value="percentage"
                                {% if coupon.discount_type == 'percentage' or not coupon %}selected{% endif %}>
                                Percentage (%)
                            </option>
                            <option value="fixed"
                                {% if coupon.discount_type == 'fixed' %}selected{% endif %}>
                                Fixed Amount (₹)
                            </option>
                        </select>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="a-form-group">
                        <label class="a-label">Discount Value</label>
                        <input type="number"
                            name="discount"
                            class="a-input"
                            value="{{ coupon.discount|default:'' }}"
                            min="1"
                            step="1"
                            required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="a-form-group">
                        <label class="a-label">Uses Per User</label>
                        <select name="usage_limit" class="a-input" required>
                            <option value="1" {% if coupon.usage_limit == 1 or not coupon %}selected{% endif %}>1</option>
                            <option value="2" {% if coupon.usage_limit == 2 %}selected{% endif %}>2</option>
                            <option value="3" {% if coupon.usage_limit == 3 %}selected{% endif %}>3</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-6" id="minOrderGroup">
                    <div class="a-form-group">
                        <label class="a-label">Minimum Order Amount (₹)</label>
                        <input type="number"
                            name="min_order_amt"
                            class="a-input"
                            value="{{ coupon.min_order_amt|default:'1000' }}"
                            min="1000"
                            step="1">
                    </div>
                </div>
            </div>


            <!-- Validity dates -->
            <div class="row">
                <div class="col-md-6">
                    <div class="a-form-group">
                        <label class="a-label">Valid From</label>
                        <input type="datetime-local" name="valid_from" class="a-input"
                               value="{% if coupon.valid_from %}{{ coupon.valid_from|date:'Y-m-d' }}T{{ coupon.valid_from|time:'H:i' }}{% endif %}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="a-form-group">
                        <label class="a-label">Valid Until</label>
                        <input type="datetime-local" name="valid_until" class="a-input"
                               value="{% if coupon.valid_until %}{{ coupon.valid_until|date:'Y-m-d' }}T{{ coupon.valid_until|time:'H:i' }}{% endif %}"
                               placeholder="Leave blank = no expiry">
                    </div>
                </div>
            </div>

            <!-- Active -->
            <div class="a-form-group d-flex align-items-center" style="gap:10px;">
                <input type="checkbox" name="is_active" id="isActive"
                       {% if coupon.is_active or not coupon %}checked{% endif %}
                       style="width:16px;height:16px;">
                <label class="a-label mb-0" for="isActive">Active (users can apply this coupon)</label>
            </div>

            <div class="d-flex mt-3" style="gap:10px;">
                <button type="submit" class="btn-admin">
                    <i class="fas fa-save mr-1"></i> Save Coupon
                </button>
                <a href="{% url 'admin_coupon_list' %}" class="btn-action"
                   style="background:#f0f0f0;color:#545454;padding:8px 18px;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function toggleMinOrder() {
    const type = document.getElementById("discountType").value;
    const minOrderGroup = document.getElementById("minOrderGroup");

    if (type === "fixed") {
        minOrderGroup.style.display = "block";
    } else {
        minOrderGroup.style.display = "none";
    }
}
document.addEventListener("DOMContentLoaded", toggleMinOrder);
</script>

{% endblock %}
